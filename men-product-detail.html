<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Men's Shoe Detail - Fariha's Collection</title>
    <meta name="description" content="Shop men's shoes at Fariha's Collection — quality footwear with authentic tags and details.">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="literata/css/literata.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        /* ===== PRODUCT DETAIL PAGE STYLES ===== */
        body { font-family: 'Outfit', sans-serif; background: #fafafa; }

        /* Sticky header override for this page (always visible) */
        .pd-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 100;
            border-bottom: 1px solid #f0f0f0;
            box-shadow: 0 2px 16px rgba(0,0,0,0.04);
        }
        .pd-header-left, .pd-header-right { display: flex; align-items: center; gap: 12px; flex: 1; }
        .pd-header-right { justify-content: flex-end; }
        .pd-header-center { flex: 2; text-align: center; }
        .pd-header-center a {
            font-family: 'Literata', serif;
            font-size: 1.35rem; font-weight: 800; letter-spacing: 1px; line-height: 1.1;
            text-decoration: none; color: #000; display: inline-block; margin: 0;
        }
        .pd-icon-btn { background: none; border: none; cursor: pointer; font-size: 1.5rem; color: #333; transition: color 0.2s; }
        .pd-icon-btn:hover { color: #000; }

        /* Breadcrumb */
        .breadcrumb {
            max-width: 1200px; margin: 0 auto; padding: 1rem 2rem 0;
            display: flex; align-items: center; gap: 0.5rem;
            font-size: 0.78rem; color: #aaa; font-weight: 500;
        }
        .breadcrumb a { color: #aaa; text-decoration: none; transition: color 0.2s; }
        .breadcrumb a:hover { color: #111; }
        .breadcrumb span { color: #111; }

        /* ===== MAIN PRODUCT LAYOUT ===== */
        .pd-main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem 2rem 4rem;
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 3rem;
            align-items: start;
        }

        /* ===== IMAGE GALLERY ===== */
        .pd-gallery { position: sticky; top: 90px; max-width: 420px; }

        .pd-main-img-wrap {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #f5f5f5;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 14px;
            position: relative;
        }
        .pd-main-img-wrap img {
            width: 100%; height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
            transition: transform 0.5s cubic-bezier(0.16,1,0.3,1);
        }
        .pd-main-img-wrap:hover img { transform: scale(1.04); }

        /* NWT badge */
        .nwt-badge {
            position: absolute;
            top: 16px; left: 16px;
            background: #111; color: #fff;
            font-size: 0.65rem; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase;
            padding: 5px 12px; border-radius: 20px;
        }

        .pd-thumbs {
            display: flex; gap: 10px;
        }
        .pd-thumb {
            width: 80px; height: 80px;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.2s, transform 0.2s;
            flex-shrink: 0;
            background: #f5f5f5;
        }
        .pd-thumb.active { border-color: #111; }
        .pd-thumb:hover { transform: scale(1.04); border-color: #999; }
        .pd-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* ===== PRODUCT INFO PANEL ===== */
        .pd-info { padding-top: 0.5rem; }

        .pd-brand-tag {
            font-size: 0.72rem; font-weight: 600; letter-spacing: 2px;
            text-transform: uppercase; color: #e8699a; margin-bottom: 8px;
        }
        .pd-title {
            font-size: 1.75rem; font-weight: 800; color: #111;
            line-height: 1.2; margin-bottom: 10px;
        }

        /* Star rating row */
        .pd-rating {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 18px;
        }
        .pd-stars { color: #f5a623; font-size: 1rem; letter-spacing: 2px; }
        .pd-rating-count { font-size: 0.8rem; color: #999; }

        /* Price */
        .pd-price-row {
            display: flex; align-items: baseline; gap: 12px;
            margin-bottom: 20px;
        }
        .pd-price { font-size: 1.8rem; font-weight: 800; color: #111; }
        .pd-price-original {
            font-size: 1.1rem; font-weight: 500; color: #bbb;
            text-decoration: line-through;
        }
        .pd-price-badge {
            background: #fde8f0; color: #c62a6d;
            font-size: 0.72rem; font-weight: 700;
            padding: 3px 10px; border-radius: 20px; letter-spacing: 0.5px;
        }

        /* Condition bar */
        .pd-condition-bar {
            display: flex; align-items: center; gap: 8px;
            background: #f0fdf4; border: 1px solid #bbf7d0;
            border-radius: 10px; padding: 10px 14px;
            font-size: 0.8rem; color: #166534;
            font-weight: 600; margin-bottom: 22px;
        }
        .pd-condition-bar i { font-size: 1.1rem; color: #22c55e; }

        /* Divider */
        .pd-divider { border: none; border-top: 1px solid #f0f0f0; margin: 20px 0; }

        /* Size selector */
        .pd-label {
            font-size: 0.8rem; font-weight: 700; letter-spacing: 1px;
            text-transform: uppercase; color: #555; margin-bottom: 12px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .pd-label a { font-weight: 500; color: #e8699a; text-decoration: underline; font-size: 0.75rem; letter-spacing: 0; }

        .pd-sizes {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px;
        }
        .pd-size-btn {
            min-width: 56px; height: 44px; padding: 0 12px;
            border: 1.5px solid #e0e0e0; border-radius: 10px;
            background: #fff; font-family: 'Outfit', sans-serif;
            font-size: 0.85rem; font-weight: 600; color: #333;
            cursor: pointer; transition: all 0.2s; position: relative;
        }
        .pd-size-btn:hover { border-color: #111; color: #111; }
        .pd-size-btn.selected {
            border-color: #111; background: #111; color: #fff;
        }
        .pd-size-btn.out-of-stock {
            color: #ccc; border-color: #eee; cursor: not-allowed;
        }
        .pd-size-btn.out-of-stock::after {
            content: ''; position: absolute;
            top: 50%; left: 50%; width: 80%; height: 1px;
            background: #ddd;
            transform: translate(-50%, -50%) rotate(-45deg);
        }

        /* Action buttons */
        .pd-actions { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }

        .pd-btn-cart {
            width: 100%; padding: 16px;
            background: #111; color: #fff; border: none;
            border-radius: 12px; font-family: 'Outfit', sans-serif;
            font-size: 0.95rem; font-weight: 700; letter-spacing: 0.5px;
            cursor: pointer; display: flex; align-items: center;
            justify-content: center; gap: 8px;
            transition: background 0.2s, transform 0.15s;
        }
        .pd-btn-cart:hover { background: #333; transform: translateY(-1px); }
        .pd-btn-cart:active { transform: translateY(0); }

        .pd-btn-wa {
            width: 100%; padding: 16px;
            background: #25D366; color: #fff; border: none;
            border-radius: 12px; font-family: 'Outfit', sans-serif;
            font-size: 0.95rem; font-weight: 700; letter-spacing: 0.5px;
            cursor: pointer; display: flex; align-items: center;
            justify-content: center; gap: 8px;
            transition: background 0.2s, transform 0.15s;
            text-decoration: none;
        }
        .pd-btn-wa:hover { background: #1da851; transform: translateY(-1px); }

        /* Trust badges */
        .pd-trust {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 8px; margin-bottom: 24px;
        }
        .pd-trust-item {
            display: flex; flex-direction: column; align-items: center;
            gap: 4px; padding: 12px 8px; background: #fafafa;
            border-radius: 10px; border: 1px solid #f0f0f0;
            text-align: center;
        }
        .pd-trust-item i { font-size: 1.3rem; color: #e8699a; }
        .pd-trust-item span { font-size: 0.68rem; color: #666; font-weight: 600; line-height: 1.3; }

        /* ===== ACCORDION ===== */
        .pd-accordion { border-top: 1px solid #f0f0f0; }
        .pd-acc-item { border-bottom: 1px solid #f0f0f0; }
        .pd-acc-header {
            width: 100%; display: flex; align-items: center;
            justify-content: space-between; padding: 16px 0;
            background: none; border: none; cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-size: 0.88rem; font-weight: 700; color: #111;
            text-align: left; letter-spacing: 0.3px;
        }
        .pd-acc-icon {
            font-size: 1.1rem; color: #aaa;
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }
        .pd-acc-item.open .pd-acc-icon { transform: rotate(45deg); }
        .pd-acc-body {
            max-height: 0; overflow: hidden;
            transition: max-height 0.35s ease-out, padding 0.3s ease;
        }
        .pd-acc-item.open .pd-acc-body { max-height: 600px; }
        .pd-acc-content {
            padding: 0 0 18px; font-size: 0.875rem;
            color: #555; line-height: 1.75;
        }
        .pd-acc-content ul {
            list-style: none; padding: 0; margin: 0; display: flex;
            flex-direction: column; gap: 8px;
        }
        .pd-acc-content ul li {
            display: flex; align-items: flex-start; gap: 8px;
        }
        .pd-acc-content ul li::before {
            content: 'âœ“'; color: #e8699a; font-weight: 700;
            font-size: 0.85rem; flex-shrink: 0; margin-top: 1px;
        }
        .pd-detail-grid {
            display: grid; grid-template-columns: auto 1fr; gap: 6px 16px;
        }
        .pd-detail-key { font-weight: 600; color: #333; font-size: 0.82rem; }
        .pd-detail-val { color: #666; font-size: 0.82rem; }

        /* ===== SUGGESTED SECTION ===== */
        .pd-suggested {
            max-width: 1200px; margin: 0 auto;
            padding: 0 2rem 5rem;
        }
        .pd-suggested-title {
            font-size: 1.4rem; font-weight: 800; color: #111;
            margin-bottom: 1.5rem; position: relative;
            padding-bottom: 12px;
        }
        .pd-suggested-title::after {
            content: ''; position: absolute;
            bottom: 0; left: 0; width: 40px; height: 3px;
            background: #e8699a; border-radius: 2px;
        }
        .pd-suggested-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        /* Suggestion card */
        .sug-card {
            position: relative; cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.16,1,0.3,1), box-shadow 0.3s ease;
            border-radius: 14px; overflow: hidden; background: #fff;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .sug-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.1);
        }
        .sug-img-wrap {
            width: 100%; aspect-ratio: 1 / 1;
            overflow: hidden; background: #f5f5f5;
        }
        .sug-img-wrap img {
            width: 100%; height: 100%;
            object-fit: cover; display: block;
            transition: transform 0.5s cubic-bezier(0.16,1,0.3,1);
        }
        .sug-card:hover .sug-img-wrap img { transform: scale(1.06); }
        .sug-info { padding: 12px 14px 14px; }
        .sug-brand { font-size: 0.65rem; color: #bbb; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; }
        .sug-name { font-size: 0.88rem; font-weight: 600; color: #111; margin-bottom: 4px; line-height: 1.3; }
        .sug-price { font-size: 0.88rem; font-weight: 700; color: #111; }

        /* Notification */
        #pd-notif {
            position: fixed; top: 80px; right: 20px;
            background: #111; color: #fff; padding: 14px 22px;
            border-radius: 10px; font-size: 0.88rem; z-index: 99999;
            opacity: 0; transform: translateY(-15px);
            transition: all 0.3s ease; font-family: 'Outfit', sans-serif;
            box-shadow: 0 8px 30px rgba(0,0,0,0.25);
            pointer-events: none;
        }
        #pd-notif.show { opacity: 1; transform: translateY(0); }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 900px) {
            .pd-main { grid-template-columns: 1fr; gap: 2rem; }
            .pd-gallery { position: static; }
            .pd-suggested-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .pd-main { padding: 1rem 1rem 3rem; }
            .pd-title { font-size: 1.4rem; }
            .pd-price { font-size: 1.5rem; }
            .pd-suggested { padding: 0 1rem 3rem; }
            .pd-suggested-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .pd-header { padding: 0.8rem 1rem; }
        }
    </style>
</head>

    <script>
        // ===== SANITY CONFIG =====
        const SANITY_PROJECT_ID = 'kxnjofhp';
        const SANITY_DATASET = 'production';
        const SANITY_API_VERSION = '2024-01-01';

        function sanityQueryUrl(query, params) {
            const base = `https://${SANITY_PROJECT_ID}.api.sanity.io/v${SANITY_API_VERSION}/data/query/${SANITY_DATASET}`;
            const qs = new URLSearchParams({ query });
            for (const [k, v] of Object.entries(params || {})) qs.set(`$${k}`, JSON.stringify(v));
            return `${base}?${qs.toString()}`;
        }

        // ===== CART =====
        // Populated with URL fallback values immediately (so the page isn't blank
        // while Sanity loads), then overwritten once the full product arrives.
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        const PRODUCT = {
            name: urlParams.get('name') || 'Loading...',
            price: parseInt(urlParams.get('price')) || 0,
            image: urlParams.get('image') || ''
        };
        let selectedSize = null;

        // ===== INITIAL (FALLBACK) POPULATION FROM URL PARAMS =====
        const pdName = urlParams.get('name');
        const pdPrice = urlParams.get('price');
        const pdImage = urlParams.get('image');
        const pdTag = urlParams.get('tag');

        if (pdName) {
            document.getElementById('pageTitle').textContent = pdName + " | Fariha's Collection";
            document.getElementById('breadcrumbName').textContent = pdName;
            document.getElementById('pdTitleName').textContent = pdName;
        }
        if (pdPrice) {
            document.getElementById('pdPriceVal').textContent = "Rs" + parseInt(pdPrice).toLocaleString();
            document.getElementById('pdPriceOriginal').style.display = 'none';
            document.getElementById('pdDiscountBadge').style.display = 'none';
        }
        if (pdImage) {
            document.getElementById('mainImg').src = pdImage;
            const badge = document.querySelector('.nwt-badge');
            if (badge) badge.style.display = 'none';
        }
        if (pdTag) {
            document.getElementById('pdBrand').textContent = pdTag;
        }

        // ===== FETCH FULL PRODUCT FROM SANITY (description, gallery, sizes) =====
        async function loadProductFromSanity() {
            if (!productId) return; // no id passed, fallback data above is all we have

            const query = `*[_type == "shoe" && _id == $id][0]{
                name,
                price,
                tag,
                description,
                "image": image.asset->url,
                "gallery": gallery[].asset->url,
                sizes
            }`;

            try {
                const res = await fetch(sanityQueryUrl(query, { id: productId }));
                if (!res.ok) throw new Error(`Sanity request failed: ${res.status}`);
                const json = await res.json();
                const product = json.result;
                if (!product) return; // product not found, keep fallback data

                applyProduct(product);
            } catch (err) {
                console.error('Failed to load product from Sanity:', err);
                // Fallback URL-param data stays on screen; page remains usable.
            }
        }

        function applyProduct(p) {
            const name = p.name || PRODUCT.name;
            const price = Number(p.price) || PRODUCT.price;
            const mainImage = p.image || PRODUCT.image;
            const gallery = Array.isArray(p.gallery) ? p.gallery : [];
            const allImages = [mainImage, ...gallery].filter(Boolean);

            PRODUCT.name = name;
            PRODUCT.price = price;
            PRODUCT.image = mainImage;

            document.getElementById('pageTitle').textContent = name + " | Fariha's Collection";
            document.getElementById('breadcrumbName').textContent = name;
            document.getElementById('pdTitleName').textContent = name;
            document.getElementById('pdPriceVal').textContent = "Rs" + price.toLocaleString();
            document.getElementById('pdPriceOriginal').style.display = 'none';
            document.getElementById('pdDiscountBadge').style.display = 'none';

            if (p.tag) document.getElementById('pdBrand').textContent = p.tag;

            const badge = document.querySelector('.nwt-badge');
            if (badge) badge.style.display = 'none';

            // ----- Gallery: main image + thumbnails -----
            const mainImg = document.getElementById('mainImg');
            mainImg.src = allImages[0] || '';
            mainImg.alt = name;

            const thumbStrip = document.getElementById('thumbStrip');
            if (allImages.length > 1) {
                thumbStrip.innerHTML = allImages.map((url, i) => `
                    <div class="pd-thumb${i === 0 ? ' active' : ''}" data-img="${url}" data-alt="${name} view ${i + 1}">
                        <img src="${url}" alt="${name} view ${i + 1}">
                    </div>
                `).join('');
                thumbStrip.style.display = 'flex';
                wireGalleryThumbs();
            } else {
                thumbStrip.style.display = 'none';
            }

            // ----- Description -----
            if (p.description) {
                const descBody = document.getElementById('pdDescription');
                if (descBody) descBody.innerHTML = `<p>${p.description.replace(/\n/g, '<br>')}</p>`;
            }

            // ----- Sizes -----
            // ----- Sizes + Stock -----
            const sizeSelector = document.getElementById('sizeSelector');
            let totalStock = 0;
            if (Array.isArray(p.sizes) && p.sizes.length > 0) {
                totalStock = p.sizes.reduce((sum, s) => sum + (Number(s.stock) || 0), 0);
                sizeSelector.innerHTML = p.sizes.map((s, i) => {
                    const outOfStock = !s.stock || s.stock <= 0;
                    const isFirstAvailable = !outOfStock && !sizeSelector.dataset.firstSet;
                    if (isFirstAvailable) sizeSelector.dataset.firstSet = 'true';
                    return `<button class="pd-size-btn${outOfStock ? ' out-of-stock' : ''}${isFirstAvailable ? ' selected' : ''}"
                                data-size="${s.size}" ${outOfStock ? 'disabled' : ''}>${s.size}</button>`;
                }).join('');
                delete sizeSelector.dataset.firstSet;
                const firstSelected = sizeSelector.querySelector('.selected');
                selectedSize = firstSelected ? firstSelected.dataset.size : null;
                wireSizeButtons();
            } else {
                // No sizes configured for this product â€” hide the selector entirely
                const sizeBlock = sizeSelector.closest('div');
                if (sizeBlock) sizeBlock.style.display = 'none';
                selectedSize = null;
            }

            // ----- Stock Count Display -----
            updateStockDisplay(totalStock, Array.isArray(p.sizes) && p.sizes.length > 0);
        }

        function updateStockDisplay(totalStock, hasSizes) {
            const stockRow = document.getElementById('pdStockRow');
            const stockIcon = document.getElementById('pdStockIcon');
            const stockText = document.getElementById('pdStockText');
            const atcBtn = document.getElementById('pdAddToCart');

            if (!stockRow) return;

            if (!hasSizes) {
                // No stock info available, hide the row
                stockRow.style.display = 'none';
                return;
            }

            stockRow.style.display = 'block';

            if (totalStock <= 0) {
                stockIcon.textContent = 'ðŸ”´';
                stockText.textContent = 'Out of Stock';
                stockText.style.color = '#e53935';
                // Disable ATC button
                if (atcBtn) {
                    atcBtn.disabled = true;
                    atcBtn.innerHTML = '<i class="ph ph-x-circle"></i> Out of Stock';
                    atcBtn.style.background = '#ccc';
                    atcBtn.style.cursor = 'not-allowed';
                    atcBtn.style.color = '#666';
                }
            } else if (totalStock <= 3) {
                stockIcon.textContent = 'ðŸŸ¡';
                stockText.textContent = `Only ${totalStock} left in stock â€” order soon!`;
                stockText.style.color = '#f57c00';
                if (atcBtn) {
                    atcBtn.disabled = false;
                    atcBtn.innerHTML = '<i class="ph ph-shopping-bag"></i> Add to Cart';
                    atcBtn.style.background = '';
                    atcBtn.style.cursor = '';
                    atcBtn.style.color = '';
                }
            } else {
                stockIcon.textContent = 'ðŸŸ¢';
                stockText.textContent = `${totalStock} in stock`;
                stockText.style.color = '#2e7d32';
                if (atcBtn) {
                    atcBtn.disabled = false;
                    atcBtn.innerHTML = '<i class="ph ph-shopping-bag"></i> Add to Cart';
                    atcBtn.style.background = '';
                    atcBtn.style.cursor = '';
                    atcBtn.style.color = '';
                }
            }
        }

        function getCart() { return JSON.parse(localStorage.getItem('fc_cart') || '[]'); }
        function saveCart(c) { localStorage.setItem('fc_cart', JSON.stringify(c)); updateBadge(); }

        function updateBadge() {
            const count = getCart().reduce((s, i) => s + i.qty, 0);
            const badge = document.getElementById('cartBadge');
            badge.textContent = count;
            badge.style.display = count > 0 ? 'flex' : 'none';
        }

        function addToCart() {
            const cart = getCart();
            const key = PRODUCT.name + (selectedSize ? ' Â· ' + selectedSize : '');
            const ex = cart.find(i => i.name === key);
            if (ex) ex.qty++;
            else cart.push({ name: key, price: PRODUCT.price, image: PRODUCT.image, qty: 1 });
            saveCart(cart);
            showNotif('âœ“ Added to cart' + (selectedSize ? ' â€” ' + selectedSize : ''));
        }

        function showNotif(msg) {
            const n = document.getElementById('pd-notif');
            n.textContent = msg;
            n.classList.add('show');
            clearTimeout(n._t);
            n._t = setTimeout(() => n.classList.remove('show'), 2800);
        }

        // Size buttons (re-bindable since sizes render dynamically)
        function wireSizeButtons() {
            document.querySelectorAll('.pd-size-btn:not(.out-of-stock)').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.pd-size-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedSize = btn.dataset.size;
                });
            });
        }

        // Add to cart
        document.getElementById('pdAddToCart').addEventListener('click', addToCart);

        // Cart icon â†’ checkout
        document.getElementById('cartBtn').addEventListener('click', () => window.location.href = 'checkout.html');

        // Back button
        document.getElementById('backBtn').addEventListener('click', () => {
            if (document.referrer) window.history.back();
            else window.location.href = 'shoes (1).html';
        });

        // ===== IMAGE GALLERY ===== (re-bindable since thumbs render dynamically)
        function wireGalleryThumbs() {
            document.querySelectorAll('.pd-thumb').forEach(thumb => {
                thumb.addEventListener('click', () => {
                    document.querySelectorAll('.pd-thumb').forEach(t => t.classList.remove('active'));
                    thumb.classList.add('active');
                    const mainImg = document.getElementById('mainImg');
                    mainImg.style.opacity = '0';
                    mainImg.style.transform = 'scale(0.97)';
                    setTimeout(() => {
                        mainImg.src = thumb.dataset.img;
                        mainImg.alt = thumb.dataset.alt;
                        mainImg.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
                        mainImg.style.opacity = '1';
                        mainImg.style.transform = 'scale(1)';
                    }, 150);
                });
            });
        }

        // ===== ACCORDION =====
        document.querySelectorAll('.pd-acc-header').forEach(btn => {
            btn.addEventListener('click', () => {
                const item = btn.parentElement;
                const isOpen = item.classList.contains('open');
                document.querySelectorAll('.pd-acc-item').forEach(i => i.classList.remove('open'));
                if (!isOpen) item.classList.add('open');
            });
        });

        // ===== SUGGESTED PRODUCTS ("You May Also Like") =====
        async function loadSuggestedProducts() {
            const grid = document.getElementById('suggestedGrid');
            if (!grid) return;

            // Pull up to 8 other men's shoes, excluding the current product, then show 4 at random
            const query = `*[_type == "shoe" && category == "men" && _id != $id] | order(order asc) [0...8]{
                _id, name, price, "image": image.asset->url
            }`;

            try {
                const res = await fetch(sanityQueryUrl(query, { id: productId || '' }));
                if (!res.ok) throw new Error(`Sanity request failed: ${res.status}`);
                const json = await res.json();
                let products = json.result || [];

                if (products.length === 0) {
                    grid.closest('.pd-suggested').style.display = 'none';
                    return;
                }

                // Shuffle then take 4, so it feels fresh across visits
                products = products.sort(() => Math.random() - 0.5).slice(0, 4);

                grid.innerHTML = products.map(p => {
                    const name = p.name || 'Untitled Product';
                    const price = Number(p.price) || 0;
                    const image = p.image || '';
                    const params = new URLSearchParams({ id: p._id, name, price, image });
                    return `
                        <div class="sug-card" onclick="window.location='men-product-detail.html?${params.toString()}'">
                            <div class="sug-img-wrap"><img src="${image}" alt="${name}" loading="lazy"></div>
                            <div class="sug-info">
                                <p class="sug-brand">Fariha's Collection</p>
                                <h3 class="sug-name">${name}</h3>
                                <p class="sug-price">Rs${price.toLocaleString()}</p>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error('Failed to load suggested products from Sanity:', err);
                grid.closest('.pd-suggested').style.display = 'none';
            }
        }

        updateBadge();
        loadProductFromSanity();
        loadSuggestedProducts();
    </script>

</body>
